<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nom du restaurant</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="favicon.png" />
  </head>

  <body>
    <h1>Réservation</h1>
    <form id="frm-reservation">
      <label for="prenom"
        >Prénom :<span class="required" aria-hidden="true">*</span></label
      >
      <input type="text" id="prenom" name="prenom" required />

      <label for="nom"
        >Nom :<span class="required" aria-hidden="true">*</span></label
      >
      <input type="text" id="nom" name="nom" required />

      <label for="telephone"
        >Numéro de téléphone :<span class="required" aria-hidden="true"
          >*</span
        ></label
      >
      <input type="tel" id="telephone" name="telephone" required />

      <label for="nombre-personnes"
        >Nombre de personnes :<span class="required" aria-hidden="true"
          >*</span
        ></label
      >
      <input
        type="number"
        id="nombre-personnes"
        name="nombre-personnes"
        required
      />

      <label for="date"
        >Journée de la réservation :<span class="required" aria-hidden="true"
          >*</span
        ></label
      >
      <input type="date" name="date" required />

      <label for="commentaire">Commentaire :</label>
      <input type="textarea" id="commentaire" name="commentaire" />

      <label for="email">Adresse courriel :</label>
      <input type="email" id="email" name="email" />

      <input id="infolettre" type="checkbox" name="infolettre" />
      <label for="infolettre"
        >Je désire recevoir l'infolettre mensuelle du restaurant</label
      >
    </form>
    <!--Champs à ajouter au formulaire :
    - ✔ Prénom et nom du client
    - ✔ Le numéro de téléphone du client
    - ✔ Le nombre de personnes pour la réservation
    - ✔ La date de la réservation
    - Le choix entre une réservation Salle à manger ou Terrasse
    - L’heure de la réservation, parmi les choix suivants : 12:00 / 12:30 / 13:00 / 13:30 /
    17:00 / 17:30 / 18:00 / 18:30 / 19:00 / 19:30 / 20:00 / 20:30 / 21:00
    - ✔ On doit permettre au client de laisser un commentaire supplémentaire dans le
    formulaire (champs facultatif pour le client)
    - ✔ Le courriel du client (champs facultatif pour le client)
    - ✔ Le client doit pouvoir cocher s' il veut s’inscrire à l’infolettre. (champs facultatif
    pour le client).-->
  </body>
</html>
