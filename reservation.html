<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nom du restaurant</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="favicon.png" />
  </head>

  <body>
    <main>
      <h1>Réservation</h1>
      <form id="frm-reservation">
        <label for="prenom"
          >Prénom :<span class="required" aria-hidden="true">*</span></label
        >
        <input type="text" id="prenom" name="prenom" required />

        <label for="nom"
          >Nom :<span class="required" aria-hidden="true">*</span></label
        >
        <input type="text" id="nom" name="nom" required />

        <label for="telephone"
          >Numéro de téléphone :<span class="required" aria-hidden="true"
            >*</span
          ></label
        >
        <input type="tel" id="telephone" name="telephone" required />

        <label for="nombre-personnes"
          >Nombre de personnes :<span class="required" aria-hidden="true"
            >*</span
          ></label
        >
        <input
          type="number"
          id="nombre-personnes"
          name="nombre-personnes"
          required
        />

        <label for="date"
          >Journée de la réservation :<span class="required" aria-hidden="true"
            >*</span
          ></label
        >
        <input type="date" name="date" required />

        <fieldset id="type-reservation">
          <legend>Type de réservation</legend>
          <label for="salle-a-manger">
            <input type="radio" name="radio" value="salle-a-manger" />Salle à
            manger</label
          >
          <label for="terrasse"
            ><input type="radio" name="radio" value="terrasse" />Terrasse</label
          >
        </fieldset>

        <fieldset id="heure-reservation">
          <legend>Heure de la réservation</legend>
          <select name="heure-reservation" id="heure-reservation">
            <option value="12-00-PM">12:00 PM</option>
            <option value="12-30-PM">12:30 PM</option>
            <option value="13-00-PM">13:00 PM</option>
            <option value="13-30-PM">13:30 PM</option>
            <option value="17-00-PM">17:00 PM</option>
            <option value="17-30-PM">17:30 PM</option>
            <option value="18-00-PM">18:00 PM</option>
            <option value="18-30-PM">18:30 PM</option>
            <option value="19-00-PM">19:00 PM</option>
            <option value="19-30-PM">19:30 PM</option>
            <option value="20-00-PM">20:00 PM</option>
            <option value="20-30-PM">20:30 PM</option>
            <option value="21-00-PM">21:00 PM</option>
          </select>
        </fieldset>

        <label for="commentaire">Commentaire :</label>
        <input type="textarea" id="commentaire" name="commentaire" />

        <label for="email">Adresse courriel :</label>
        <input type="email" id="email" name="email" />

        <input id="infolettre" type="checkbox" name="infolettre" />
        <label for="infolettre"
          >Je désire recevoir l'infolettre mensuelle du restaurant</label
        >
      </form>
    </main>
  </body>
</html>
